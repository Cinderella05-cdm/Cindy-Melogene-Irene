<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastry Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Sweet Delights Pastry Shop</h1>
        <p>Freshly baked pastries every day</p>
    </header>

    <section class="products">

        <div class="card">
            <img src="crosiant.webp" alt="Croissant">
            <h2>Butter Croissant</h2>
            <p>Flaky and buttery classic French pastry.</p>
            <span class="price">₱85</span>
        </div>

        <div class="card">
            <img src="cupcakes.webp" alt="Cupcake">
            <h2>Chocolate Cupcake</h2>
            <p>Rich chocolate cake with creamy frosting.</p>
            <span class="price">₱95</span>
        </div>

        <div class="card">
            <img src="donut" alt="Donut">
            <h2>Glazed Donut</h2>
            <p>Soft donut with sweet sugar glaze.</p>
            <span class="price">₱60</span>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Macarons">
            <h2>Macarons</h2>
            <p>Colorful almond meringue cookies.</p>
            <span class="price">₱120</span>
        </div>

    </section>

</body>
</html>
